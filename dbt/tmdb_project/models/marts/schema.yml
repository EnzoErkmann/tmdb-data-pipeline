version: 2

models:
  - name: mart_movie_financials
    description: "Fundamental financial calculations per movie, including Absolute Profit and ROI (Return on Investment)."
  - name: mart_genre_performance
    description: "Financial performance (ROI, Average Revenue) aggregated by cinematic genre."
  - name: mart_company_performance
    description: "Production studios rank by average ROI, filtering out low-volume companies."
  - name: mart_actor_performance
    description: "Actor success volume, measuring roles in critically acclaimed and highly popular recent movies."
  - name: mart_director_performance
    description: "Director evaluation based on financial return (ROI) and audience approval (Vote Average)."
  - name: mart_demographics_by_genre
    description: "Cast demographics distribution (Female/Male/Non-Binary) crossed with movie genres."
  - name: mart_country_performance
    description: "Production metrics by country and annual evolution, highlighting emerging markets."
  - name: mart_release_seasonality
    description: "Average revenues, popularity, and release volume grouped by month (1 to 12) for seasonality analysis."
  - name: mart_runtime_evolution
    description: "Historical evolution of average movie runtime grouped by decade."
  - name: mart_trending_now
    description: "Updated snapshot joining Popular and Trending movies, enriched with their respective genres."
