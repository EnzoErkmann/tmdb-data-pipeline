version: '3.8'

# Base configuration block that webserver, scheduler, and init will share
x-airflow-common:
  &airflow-common
  build:
    context: .. # The Dockerfile is in the root folder
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Forces the GCP credential to look at the path INSIDE the container
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials-tmdb.json
  env_file:
    - ../.env
  volumes:
    # Volume mappings: "Host Path : Container Path"
    - ../dags:/opt/airflow/dags
    - ../extraction:/opt/airflow/extraction
    - ../dbt:/opt/airflow/dbt
    - ../logs:/opt/airflow/logs
    - ../credentials-tmdb.json:/opt/airflow/credentials-tmdb.json
  depends_on:
    postgres:
      condition: service_healthy

services:
  # 1. Database
  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=${AIRFLOW_DB_USER}
      - POSTGRES_PASSWORD=${AIRFLOW_DB_PASSWORD}
      - POSTGRES_DB=airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  # 2. Initializer (Runs only once to create tables and admin user)
  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_UPGRADE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${AIRFLOW_UI_USER}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_UI_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

  # 3. Web UI
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # 4. Scheduler
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db-volume: